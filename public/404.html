<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing Tracker</title>
    <script>
      /**
       * GitHub Pages SPA redirect.
       * When a user hits /writing-tracker/history directly, GitHub serves this
       * 404.html. We encode the path into the query string and redirect to the
       * root, where index.html decodes it and pushes the real URL into history.
       * Source: https://github.com/rafgraph/spa-github-pages
       */
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
